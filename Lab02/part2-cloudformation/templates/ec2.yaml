AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Stack - Lab02 Part2

Parameters:
  ProjectName:
    Type: String
    Default: lab02
  InstanceType:
    Type: String
    Default: t2.micro
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access
  AmiId:
    Type: String
    Default: ami-0c02fb55956c7d316
    Description: Amazon Linux 2 AMI (us-east-1)

Resources:
  PublicEC2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !Ref AmiId
      SubnetId: !ImportValue
        Fn::Sub: ${ProjectName}-PublicSubnetId
      SecurityGroupIds:
        - !ImportValue
          Fn::Sub: ${ProjectName}-PublicSGId
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-ec2

  PrivateEC2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !Ref AmiId
      SubnetId: !ImportValue
        Fn::Sub: ${ProjectName}-PrivateSubnetId
      SecurityGroupIds:
        - !ImportValue
          Fn::Sub: ${ProjectName}-PrivateSGId
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-ec2

Outputs:
  PublicEC2Id:
    Value: !Ref PublicEC2
    Description: Public EC2 Instance ID
  PublicEC2IP:
    Value: !GetAtt PublicEC2.PublicIp
    Description: Public EC2 Public IP
  PrivateEC2Id:
    Value: !Ref PrivateEC2
    Description: Private EC2 Instance ID